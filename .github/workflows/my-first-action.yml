name: 我的第一個自動化流程

# 觸發條件：當我把程式碼 push (推送到) GitHub 時執行
on: [push]

jobs:
  # 定義一個叫做 hello-job 的任務
  hello-job:
    # 使用 Ubuntu 虛擬機執行
    runs-on: ubuntu-latest
    
    steps:
      # 步驟 1: 打印簡單文字
      - name: 跟我打招呼
        run: echo "Hello GitHub Actions! 我成功觸發了流程。"

      # 步驟 2: 顯示目前的伺服器時間
      - name: 顯示時間
        run: date

name: Python Code Check Workflow
on: [push]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 複製程式碼
        uses: actions/checkout@v4

      - name: 2. 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. 安裝檢查工具
        run: |
          pip install flake8

      - name: 4. 執行檢查
        run: |
          # 檢查語法錯誤、排版問題
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics